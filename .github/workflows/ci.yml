name: C++ CI with GoogleTest

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure
        run: cmake -S project -B project/build

      - name: Build
        run: cmake --build project/build

      - name: Test
        run: ctest --test-dir project/build --output-on-failure
