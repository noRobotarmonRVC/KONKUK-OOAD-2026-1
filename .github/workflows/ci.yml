name: C++ CI with GoogleTest + clang-tidy + Codecov

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - "project/src/**"
      - "project/tests/**"
      - "project/CMakeLists.txt"
      - "project/cmake/**"
      - ".github/workflows/**"
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - "project/src/**"
      - "project/tests/**"
      - "project/CMakeLists.txt"
      - "project/cmake/**"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: [self-hosted, linux]

    defaults:
      run:
        shell: bash
        working-directory: ./project

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Detect ccache
        run: |
          if command -v ccache >/dev/null 2>&1; then
            echo "USE_CCACHE=1" >> "$GITHUB_ENV"
          else
            echo "USE_CCACHE=0" >> "$GITHUB_ENV"
          fi

      - name: Cache ccache
        if: env.USE_CCACHE == '1'
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('project/CMakeLists.txt', 'project/src/**', 'project/tests/**') }}
          restore-keys: ${{ runner.os }}-ccache-

      - name: Install gcovr
        run: python -m pip install --disable-pip-version-check gcovr

      - name: Configure
        run: |
          CMAKE_ARGS=(
            -S . -B build
            -DCMAKE_BUILD_TYPE=Debug
            "-DCMAKE_C_FLAGS=--coverage -O0 -g"
            "-DCMAKE_CXX_FLAGS=--coverage -O0 -g"
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          )

          if [ "${USE_CCACHE}" = "1" ]; then
            CMAKE_ARGS+=(
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            )
          fi

          cmake "${CMAKE_ARGS[@]}"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: clang-tidy
        if: ${{ !cancelled() }}
        uses: reviewdog/action-clang-tidy@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          clang_tidy_flags: "-p build"
          reporter: ${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }}
          filter_mode: added
          fail_on_error: false

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Generate coverage report
        run: |
          gcovr \
            --root . \
            --filter src \
            --exclude tests \
            --xml coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: project/coverage.xml
          fail_ci_if_error: false
