name: C++ CI with GoogleTest + SonarQube Cloud

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-test-sonar:
    runs-on: [self-hosted, linux]

    defaults:
      run:
        shell: bash
        working-directory: ./project

    env:
      BUILD_WRAPPER_OUT_DIR: bw-output
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify runner prerequisites
        run: |
          set -euo pipefail

          echo "== OS =="
          uname -a

          echo "== Check required commands =="
          command -v cmake
          command -v gcc
          command -v g++
          command -v gcov
          command -v python3
          command -v pip
          command -v unzip
          command -v ctest

          if command -v curl >/dev/null 2>&1; then
            echo "curl found: $(command -v curl)"
          elif command -v wget >/dev/null 2>&1; then
            echo "wget found: $(command -v wget)"
          else
            echo "ERROR: curl or wget is required."
            exit 1
          fi

          echo "== Versions =="
          cmake --version
          gcc --version
          g++ --version
          gcov --version
          python3 --version
          pip --version
          ctest --version
          unzip -v | head -n 2

      - name: Install gcovr
        run: pip install gcovr

      - name: Verify gcovr
        run: gcovr --version

      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v7

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS="--coverage -O0 -g"
          -DCMAKE_CXX_FLAGS="--coverage -O0 -g"

      - name: Build with Build Wrapper
        run: |
          build-wrapper-linux-x86-64 --out-dir "${BUILD_WRAPPER_OUT_DIR}" \
          cmake --build build --clean-first

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Generate coverage report
        run: |
          gcovr \
            --root . \
            --sonarqube coverage.xml

      - name: Check generated artifacts
        run: |
          test -f "${BUILD_WRAPPER_OUT_DIR}/compile_commands.json"
          test -f "coverage.xml"
          ls -l "${BUILD_WRAPPER_OUT_DIR}/compile_commands.json"
          ls -l "coverage.xml"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: project
          args: >
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.cfamily.compile-commands=bw-output/compile_commands.json
            -Dsonar.coverageReportPaths=coverage.xml
            -Dsonar.qualitygate.wait=true